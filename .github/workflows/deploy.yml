name: My First Workflow

on: push

jobs:
  build:
    name: build and push docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ls
      - run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/myapp:v1 .
      - run: docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
      - run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/myapp:v1

      - name: deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
           host: ${{ secrets.EC2_HOST }}
           username: ${{ secrets.EC2_USERNAME }}
           key: ${{ secrets.EC2_SSH_KEY }}
           script: |
             docker pull ${{ secrets.DOCKERHUB_USERNAME }}/myapp:v1
             docker stop myapp || true
             docker rm myapp || true
             docker run -d --name=myapp -p 80:80 ${{ secrets.DOCKERHUB_USERNAME }}/myapp:v1
